<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mermaid HD Canvas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
    <link rel="stylesheet" href="../assets/styles.css">
    <link rel="stylesheet" href="style.css">
</head>

<body class="font-sans">

    <div class="w-full px-6 py-4">
        <header class="flex justify-between items-center mb-4">
            <h1 class="text-2xl font-black title-accent tracking-tighter">Mermaid Viewer</h1>
            <div id="status-tag" class="status-ready">READY</div>
        </header>

        <div class="flex flex-col lg:flex-row gap-4 items-stretch">
            <div class="flex-1 lg:w-1/2 shadow-lg rounded-xl overflow-hidden flex flex-col">
                <textarea id="mermaid-input" placeholder="Paste your large Mermaid code here..." spellcheck="false">graph LR
    A[Large System] --> B(Module 1)
    A --> C(Module 2)
    B --> D{Data Store}
    C --> D
    D --> E[Analytics]
    E --> F[High Res Output]</textarea>

                <div class="flex p-3 border-t gap-3 items-center" id="controls-bar">
                    <select id="sample-selector">
                        <option value="">Select a Sample...</option>
                        <option value="flowchart">Flowchart</option>
                        <option value="sequence">Sequence Diagram</option>
                        <option value="timeline">Timeline</option>
                        <option value="mindmap">Mindmap</option>
                        <option value="state">State Diagram</option>
                    </select>

                    <button id="render-btn" class="btn-primary">Render Diagram</button>
                    <button id="download-btn" class="btn-success">Export to PNG</button>
                </div>
            </div>

            <div id="diagram-container" class="flex-1 lg:w-1/2">
                <div id="graph-output" class="mermaid">
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
