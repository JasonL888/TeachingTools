<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Attendee Picker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <!-- Bootstrap CSS CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../assets/styles.css">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="container-fluid py-4 px-4">
    <div class="card shadow-sm">
      <div class="card-body">
        <h2 class="card-title mb-4 text-center">Attendee Picker</h2>

        <div class="row justify-content-center mb-4">
          <div class="col-12 col-md-8 text-center">
            <button id="pickBtn" class="btn btn-primary btn-lg mb-3 w-100">Pick Random Attendee</button>
            <div id="chosen" class="alert alert-secondary d-none"></div>
          </div>
        </div>

        <div class="row justify-content-center mb-4">
          <div class="col-12 col-md-8">
            <input type="file" id="csvFile" accept=".csv" class="form-control mb-3">
          </div>
        </div>

        <div id="attendeeSection" class="d-none">
          <div class="text-center mb-3">
            <button id="toggleListsBtn" class="btn btn-outline-secondary btn-sm">Show List</button>
          </div>
          <div id="listsWrapper" class="row g-3 d-none">
            <div class="col-12 col-md-6">
              <div class="alert alert-secondary h-100 mb-0">
                <b>Not Yet Selected (<span id="remainingCount">0</span>):</b>
                <ul id="remainingList" class="mb-0"></ul>
              </div>
            </div>
            <div class="col-12 col-md-6">
              <div class="alert alert-success h-100 mb-0">
                <b>Selected (<span id="selectedCount">0</span>):</b>
                <ul id="selectedList" class="mb-0"></ul>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="./randomizer.js"></script>
</body>
</html>
